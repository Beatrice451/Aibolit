spring.application.name=diploma_new_pharmacy

spring.datasource.url=jdbc:postgresql://localhost:5433/pharmacy_db
spring.datasource.username=pharmacy_app
spring.datasource.password=${PHARMACY_DB_PASSWORD}
#spring.datasource.username=postgres
#spring.datasource.password=${PHARMACY_DB_ROOT_PASSWORD}


spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework=INFO
#logging.level.org.springframework=DEBUG

spring.flyway.default-schema=flyway
spring.flyway.schemas=pharmacy