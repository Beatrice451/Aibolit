spring:
  application:
    name: aibolit

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/pharmacy_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    default-schema: flyway
    schemas: pharmacy

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SPRING_MAIL_HOST}
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: * # TODO убрать в проде

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-ttl: 5 # в минутах
  refresh-token-ttl: 30 # в днях

server:
  port: 8080

logging:
  level:
    org.springframework: DEBUG
    org.springframework.security: DEBUG
    org.beatrice.diploma_new_pharmacy: DEBUG

guest:
  cookie:
    name: guestCartId

app:
  bootstrap-admin:
    email: ${SPRING_ADMIN_LOGIN}
    password: ${SPRING_ADMIN_PASSWORD}

media:
  path: /app/media/