services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD var is required in .env file}
      POSTGRES_USER: pharmacy_app
      POSTGRES_DB: pharmacy_db

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pharmacy_app -d pharmacy_db" ]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    env_file:
      - .env
    build: backend
    container_name: spring_app
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./media:/app/media


    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    environment:
      DB_HOST: db
      DB_PORT: 5432
      SPRING_DATASOURCE_USERNAME: pharmacy_app
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD var is required in .env file}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY var is required in .env file}
      SPRING_ADMIN_LOGIN: ${SPRING_ADMIN_LOGIN:?SPRING_ADMIN_LOGIN var is required in .env file}
      SPRING_ADMIN_PASSWORD: ${SPRING_ADMIN_PASSWORD:?SPRING_ADMIN_PASSWORD var is required in .env file}


  frontend:
    build: frontend
    container_name: frontend_app
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: chebupitsa.ru
    ports:
      - "25:25"
      - "587:587"
    environment:
      - ENABLE_OPENDKIM=1
      - ENABLE_OPENDMARC=1
      - ENABLE_IMAP=1
      - ENABLE_POP3=0
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
    volumes:
      - ./maildata:/var/mail
      - ./config:/tmp/docker-mailserver
    restart: unless-stopped

volumes:
  postgres_data: