services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD var is required in .env file}
      POSTGRES_USER: pharmacy_app
      POSTGRES_DB: pharmacy_db

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pharmacy_app -d pharmacy_db" ]
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    env_file:
      - .env
    build: .
    container_name: spring_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "1488:8080"

    volumes:
      - ./media:/app/media

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pharmacy_db
      SPRING_DATASOURCE_USERNAME: pharmacy_app
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD var is required in .env file}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY var is required in .env file}
      SPRING_ADMIN_LOGIN: ${SPRING_ADMIN_LOGIN:?SPRING_ADMIN_LOGIN var is required in .env file}
      SPRING_ADMIN_PASSWORD: ${SPRING_ADMIN_PASSWORD:?SPRING_ADMIN_PASSWORD var is required in .env file}

volumes:
  postgres_data:
